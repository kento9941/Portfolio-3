name: Next.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # change to 'yarn' or 'pnpm' if you use them

    # 3. Install dependencies
    - name: Install dependencies
      run: npm ci

    # 4. Run Next.js Linting
    - name: Run Linter
      run: npm run lint

    # 5. Run Tests (Uncomment this if you add Jest or Vitest later)
    # - name: Run Tests
    #   run: npm test

    # 6. Build the Next.js app to ensure there are no compilation errors
    - name: Build application
      run: npm run build